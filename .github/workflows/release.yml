# =============================================================================
# quasivision — Release 自动构建 & 发布工作流
# =============================================================================
# 触发方式：
#   1. 推送标签（推荐） git tag v0.1.0 && git push origin v0.1.0
#   2. 手动触发：GitHub → Actions → Release → Run workflow
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*' # 推送 v0.1.0, v1.2.3 等标签时触发
  workflow_dispatch: # 也支持手动在 GitHub 页面触发

# ── 权限 ──────────────────────────────────────────────────────────────────────
permissions:
  contents: write # 允许上传 release assets

# ── 任务 ──────────────────────────────────────────────────────────────────────
jobs:
  # ── 1. 多平台构建 ────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # ── Windows x64 ────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: .exe
            archive: zip
            archive_ext: .zip

          # ── macOS (Intel) ─────────────────────────────────────────────────
          # 注意: ort 没有为 Intel Mac 提供预编译 ONNX Runtime，
          #       需要从源码编译（设置 ORT_DYLIB_FROM_SOURCE=1）
          - target: x86_64-apple-darwin
            os: macos-13            # macos-13 = Intel x86_64 runner
            ext: ''
            archive: tar
            archive_ext: .tar.gz

          # ── macOS (Apple Silicon) ─────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest        # macos-latest 目前是 Apple Silicon runner
            ext: ''
            archive: tar
            archive_ext: .tar.gz

          # ── Linux x64 ─────────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ''
            archive: tar
            archive_ext: .tar.gz

    steps:
      # 1. 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Rust 工具链（含交叉编译 target）
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 3. Linux: 安装交叉编译所需的系统库（仅 aarch64 时需要）
      - name: Install Linux cross‑compile deps
        if: runner.os == 'Linux' && matrix.target != 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # 4. macOS Intel: 安装 ONNX Runtime 源码编译依赖
      #    ort 没有为 x86_64-apple-darwin 提供预编译包，需从源码构建
      - name: Install ORT build deps (macOS Intel)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          brew install cmake ninja

      # 5. 编译 release 版本
      #    Intel Mac 需从源码编译 ONNX Runtime，耗时较长（~30min）
      - name: Cargo build (release)
        run: cargo build --release --target ${{ matrix.target }}
        env:
          ORT_DYLIB_FROM_SOURCE: ${{ matrix.target == 'x86_64-apple-darwin' && '1' || '' }}

      # 6. 下载模型文件（resources/ 在 .gitignore 中排除，需从 Hugging Face 获取）
      - name: Download models
        shell: bash
        run: |
          BASE_URL="https://huggingface.co/chenjian-wei/quasivision-models/resolve/main"
          mkdir -p resources

          # 模型文件列表（与 src/download.rs 中的 MODEL_FILES 保持一致）
          MODELS=(
            "ocr-models/ppocrv5_mobile_det.onnx"
            "ocr-models/ppocrv5_mobile_rec.onnx"
            "ocr-models/ppocrv5_dict.txt"
            "icon-classifier/icon_classifier.onnx"
            "icon-classifier/labels.json"
            "object-detection/yolov8s-worldv2.onnx"
            "object-detection/yolov8s-worldv2_labels.txt"
          )

          for rel in "${MODELS[@]}"; do
            local="resources/$rel"
            mkdir -p "$(dirname "$local")"
            if [ ! -f "$local" ]; then
              echo "  [download] ↓ $rel"
              curl -fSL "$BASE_URL/$rel" -o "$local"
            else
              echo "  [skip] $rel already exists"
            fi
          done
          echo "  [done] All model files downloaded to resources/"

      # 7. 打包：二进制 + resources/ 模型文件
      - name: Package
        shell: bash
        run: |
          BINARY="quasivision${{ matrix.ext }}"
          ARCHIVE="quasivision-${{ matrix.target }}${{ matrix.archive_ext }}"
          STAGING="quasivision-${{ matrix.target }}"

          # 创建暂存目录
          mkdir -p "$STAGING"

          # 复制二进制
          cp "target/${{ matrix.target }}/release/$BINARY" "$STAGING/"

          # 复制资源（模型文件）
          cp -r resources "$STAGING/"

          # 复制 README / LICENSE
          cp README.md "$STAGING/"
          cp LICENSE "$STAGING/"

          # ── 压缩 ──────────────────────────────────────────────────────────
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a -tzip "$ARCHIVE" "$STAGING"
          else
            tar czf "$ARCHIVE" "$STAGING"
          fi

          echo "ASSET=$ARCHIVE" >> "$GITHUB_ENV"

      # 8. 上传到 GitHub Actions artifacts（方便后续 release 步骤取用）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quasivision-${{ matrix.target }}
          path: quasivision-${{ matrix.target }}${{ matrix.archive_ext }}

  # ── 2. 创建 Release 并上传所有构建产物 ───────────────────────────────────────
  release:
    name: Create Release & Upload Assets
    needs: build # 等所有 build 完成后再执行
    runs-on: ubuntu-latest
    if: github.event_name == 'push' # 只在 push tag 时创建 release

    steps:
      # 下载所有平台的构建产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      # 列出下载的文件
      - name: List artifacts
        run: ls -lhR

      # 提取版本号（去掉前缀 "v"）
      - name: Get version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 生成 Release 正文（自动读取变更日志或使用默认文本）
      - name: Generate release notes
        id: notes
        run: |
          cat << 'EOF' > RELEASE_NOTES.md
          ## quasivision ${{ steps.version.outputs.tag }}

          ### 📦 下载说明
          根据你的操作系统选择对应文件：

          | 平台 | 文件 |
          |------|------|
          | Windows x64 | `quasivision-x86_64-pc-windows-msvc.zip` |
          | macOS Intel | `quasivision-x86_64-apple-darwin.tar.gz` |
          | macOS Apple Silicon | `quasivision-aarch64-apple-darwin.tar.gz` |
          | Linux x64 | `quasivision-x86_64-unknown-linux-gnu.tar.gz` |

          ### 🚀 使用方式
          1. 下载对应平台的压缩包并解压
          2. 命令行运行：`./quasivision --input 图片路径`

          > 首次运行时会自动下载 ONNX Runtime 运行库，请确保网络畅通。
          EOF

      # 创建 Release 并上传所有 asset
      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: quasivision ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            quasivision-*/quasivision-*.zip
            quasivision-*/quasivision-*.tar.gz
          draft: false
          prerelease: false
